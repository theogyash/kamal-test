name: Deploy Production with Kamal

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install Ruby & Kamal
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      
      - name: Get ECR password
        run: |
            ECR_PASSWORD=$(aws ecr get-login-password --region ap-south-1)
            echo "::add-mask::$ECR_PASSWORD"
            echo "KAMAL_REGISTRY_PASSWORD=$ECR_PASSWORD" >> $GITHUB_ENV

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "::add-mask::${{ secrets.SSH_PRIVATE_KEY }}"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/soulbol-kamal-ronak.pem
          chmod 600 ~/.ssh/soulbol-kamal-ronak.pem

      - name: Setup root SSH access on instance
        run: |
          SERVER_IP=$(grep -A5 'hosts:' config/deploy.staging.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          ssh -i ~/.ssh/soulbol-kamal-ronak.pem -o StrictHostKeyChecking=no ubuntu@$SERVER_IP bash << 'EOF'
            sudo mkdir -p /root/.ssh
            sudo chmod 700 /root/.ssh
            sudo cp /home/ubuntu/.ssh/authorized_keys /root/.ssh/authorized_keys.tmp
            sudo sed 's/^no-port-forwarding[^"]*exit 142" //' /root/.ssh/authorized_keys.tmp | sudo tee /root/.ssh/authorized_keys > /dev/null
            sudo chmod 600 /root/.ssh/authorized_keys
            sudo chown root:root /root/.ssh/authorized_keys
            sudo rm -f /root/.ssh/authorized_keys.tmp
          EOF

      - name: Ensure swap exists on target server
        run: |
          SERVER_IP=$(grep -A5 'hosts:' config/deploy.staging.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          
          if [ -z "$SERVER_IP" ]; then
            echo "No server IP found in config/deploy.staging.yml"
            exit 1
          fi
          
          echo "Configuring swap on $SERVER_IP"
          
          ssh -i ~/.ssh/soulbol-kamal-ronak.pem -o StrictHostKeyChecking=no root@$SERVER_IP 'bash -s' <<'EOF'
          set -e
          
          SWAPFILE="/swapfile"
          SWAPSIZE="4G"
          
          echo "Current memory:"
          free -h || true
          
          if swapon --show=NAME | grep -qx "$SWAPFILE"; then
            echo "Swap is already active at $SWAPFILE. Skipping creation."
          else
            if [ ! -f "$SWAPFILE" ]; then
              echo "Creating $SWAPSIZE swap file at $SWAPFILE..."
          
              if command -v fallocate >/dev/null 2>&1; then
                fallocate -l "$SWAPSIZE" "$SWAPFILE"
              else
                dd if=/dev/zero of="$SWAPFILE" bs=1M count=4096
              fi
          
              chmod 600 "$SWAPFILE"
              mkswap "$SWAPFILE"
            else
              echo "$SWAPFILE already exists. Enabling it."
              chmod 600 "$SWAPFILE"
            fi
          
            swapon "$SWAPFILE"
          fi
          
          if ! grep -qE '^[^#]*[[:space:]]/swapfile[[:space:]]' /etc/fstab; then
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
            echo "Added swapfile to /etc/fstab"
          else
            echo "Swapfile already present in /etc/fstab"
          fi
          
          sysctl vm.swappiness=10
          
          if ! grep -q '^vm.swappiness=10' /etc/sysctl.conf; then
            echo 'vm.swappiness=10' >> /etc/sysctl.conf
          fi
          
          echo "Final memory:"
          free -h
          EOF

      - name: Deploy production with Kamal
        run: |
          kamal lock release -d prod
          kamal setup -d prod
          kamal deploy -d prod
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ env.KAMAL_REGISTRY_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1