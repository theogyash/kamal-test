<%
require "dotenv";
Dotenv.load("env.env")
%>

service: <%= ENV['SERVICE_NAME'] %>
image: <%= ENV['DOCKER_IMAGE'] %>


servers:
  web:
    hosts:
      - <%= ENV['SERVER_IP'] %>
    proxy:
      # app_port: 3000 
      path_prefix: /


<% if ENV['REPLICAS'].to_i > 1 %>
<% (2..ENV['REPLICAS'].to_i).each do |i| %>
  web-<%= i %>:
    hosts:
      - <%= ENV['SERVER_IP'] %>
    env:
      clear:
        PORT: "<%= 3000 + i %>"
    proxy:
      path_prefix: "/<%= i %>"
<% end %>
<% end %>

  Worker:
    hosts: 
      - <%= ENV['SERVER_IP'] %>
    cmd: /app/my-go-app
    env:
      clear:
        APP_ROLE: worker
    proxy: false

hooks_path: .kamal/hooks

 

  # secret:
  #   - DB_HOST      # If $DB_HOST is unset locally, Kamal fails.
  #   - SECRET_KEY

ssh:
  user: root
  keys: 
    - <%= ENV.fetch("SSH_KEY_PATH") %>

registry:
  server: 421600551233.dkr.ecr.ap-south-1.amazonaws.com 
  username: AWS                                             
  password: <%= %x(aws ecr get-login-password --region ap-south-1 --profile rvj-yash) %>



proxy:
  host: <%= ENV.fetch("SERVER_IP") %>
  app_port: 3000       
  healthcheck:             
    path: /up            
    interval:  1           
    timeout: 3         
    

builder:
  arch: amd64